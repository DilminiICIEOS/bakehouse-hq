version: '3.9'

services:
  db:
    image: postgres:15
    container_name: bakery_hq_db
    environment:
      POSTGRES_DB: ${DB_NAME:-bakery_hq}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bakery_hq_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bakery_hq_backend
    command: gunicorn bakery_hq.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-bakery_hq}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8000
    volumes:
      - ..:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bakery_hq_celery
    command: celery -A bakery_hq worker -l info
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-bakery_hq}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ..:/app
    depends_on:
      - db
      - redis
      - backend

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bakery_hq_celery_beat
    command: celery -A bakery_hq beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-bakery_hq}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ..:/app
    depends_on:
      - db
      - redis
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
